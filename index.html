<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyMate AI</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<header>

<h1>🎓 StudyMate AI</h1>

<p>Your Smart Study Companion</p>

</header>



<div class="container">


<!-- Countdown -->

<div class="card">

<h2>📅 Exam Countdown</h2>

<input type="date" id="examDate">

<button onclick="calculateDays()">
Check
</button>

<h3 id="countdown">
Enter exam date
</h3>

</div>




<!-- Planner -->


<div class="card">

<h2>📚 Study Planner</h2>


<input 
type="text" 
id="subjects"
placeholder="Subjects (Java, DBMS, OS)"
>


<input 
type="number"
id="hours"
placeholder="Hours/day"
>


<button onclick="createPlan()">
Generate Plan
</button>


<div id="plan">

</div>


</div>






<!-- Timer -->


<div class="card">

<h2>⏳ Pomodoro Timer</h2>


<h1 id="timer">
25:00
</h1>


<button onclick="startTimer()">
Start
</button>


<button onclick="pauseTimer()">
Pause
</button>


<button onclick="resetTimer()">
Reset
</button>


</div>






<!-- Notes -->


<div class="card">


<h2>📝 Notes</h2>


<input
id="noteTitle"
placeholder="Topic"
>


<textarea
id="noteText"
placeholder="Write notes..."
></textarea>


<button onclick="saveNote()">
Save Note
</button>


<div id="notes">

</div>


</div>



</div>





<script src="script.js"></script>

</body>

</html>
